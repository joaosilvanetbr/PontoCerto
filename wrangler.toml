name = "pontocerto"
compatibility_date = "2025-05-01"
compatibility_flags = ["nodejs_compat"]

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "pontocerto-db"
database_id = "00000000-0000-0000-0000-000000000000"

# Pages site configuration (for wrangler pages deploy)
[site]
bucket = "./dist/public"
