name = "ponto-facil"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "ponto-facil-db"
database_id = "00000000-0000-0000-0000-000000000000"  # Replace with actual D1 database ID after creation

[build]
command = "npm run build"

[site]
bucket = "./dist/public"

# Dev local D1 binding (optional - uses wrangler d1 local)
[[env.dev.d1_databases]]
binding = "DB"
database_name = "ponto-facil-dev"
database_id = "dev-local"
